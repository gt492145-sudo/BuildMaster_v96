# Nginx 反代範例：HTTPS → 本機 Node（BuildMaster 同機同源 A）
#
# 使用步驟（Ubuntu 常見）：
#   1. sudo apt install nginx certbot python3-certbot-nginx
#   2. 將此檔內 your-domain.com 改成你的網域，存到 /etc/nginx/sites-available/buildmaster
#   3. sudo ln -s /etc/nginx/sites-available/buildmaster /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
#   5. sudo certbot --nginx -d your-domain.com
#
# 前提：systemd 已啟動 buildmaster-api，且 server/.env 內
#   HOST=127.0.0.1
#   PORT=8787

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 大檔上傳／長時間請求可視需要調大
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        client_max_body_size 50m;
    }
}
